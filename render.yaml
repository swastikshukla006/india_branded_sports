services:
  - type: web
    name: indias-branded-sports
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: ibs-data
      mountPath: /var/data
      sizeGB: 1
